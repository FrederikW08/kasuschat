<!DOCTYPE html>
<html>
<head>
<title>Kasus Chat</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

#chat{
width:90%;
max-width:600px;
margin:auto;
height:400px;
overflow-y:scroll;
border:1px solid #444;
padding:10px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
}

#flemming {
  display: none;
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 200px;
}

#AKK {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 150px;
}

#discription1 {
  font-size: 15px;
}

#discription2 {
  font-size: 15px;
  font-style: italic;
  line-height: 0.2;
}
  
</style>
</head>

<body>

<div id="login">
<h2>Enter Password</h2>
<input id="password" type="password">
<button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">
  <img id="flemming" src="flemming.png">
  <img id="AKK" src="https://allerodgymnasium.dk/wp-content/uploads/Anne-Kongsted-Knudsen-1-e1758701627552-286x279.jpg">

  <h1>Kasus Chat</h1>
  <p id="discription1">Inspireret af Flemmings quote:</p>
  <p id="discription2">"Historie, kasus og alt det der...</p>
  <p id="discription2">men hvis bare der fandtes et annonymt og lukket chat sted."</p>

  <div id="chat"></div>

  <input id="name" placeholder="Your name">
  <input id="message" placeholder="Message" onkeypress="if(event.key==='Enter') send()">
  <button onclick="send()">Send</button>
</div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove, onValue } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCl_6vsYoZkEBMUNf0P4CK01hKCwA5P0XQ",
  authDomain: "kasuschat.firebaseapp.com",
  databaseURL: "https://kasuschat-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kasuschat",
  storageBucket: "kasuschat.firebasestorage.app",
  messagingSenderId: "953505535371",
  appId: "1:953505535371:web:0d44f20017bc8664948b8e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ASK FOR NOTIFICATION PERMISSION
if ("Notification" in window) {

if (Notification.permission !== "granted") {
Notification.requestPermission();
}

}

const chat = ref(db, "messages");

function send(){

let name = document.getElementById("name").value;
let message = document.getElementById("message").value;

let time = Date.now();

// check admin command
if(message.startsWith("/clear")){

let parts = message.split(" ");
let pass = parts[1];

if(pass === ADMIN_PASSWORD){

remove(chat).then(()=>{
document.getElementById("chat").innerHTML = "";
});

}else{
alert("Wrong admin password");
}

document.getElementById("message").value="";
return;

}

push(chat,{
name:name,
message:message,
timestamp: time
});

document.getElementById("message").value="";

}

onChildAdded(chat,(data)=>{

let msg = data.val();

let time = new Date(msg.timestamp);
let formattedTime = time.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});

let div = document.createElement("div");

div.innerHTML = "["+formattedTime+"] <b>"+msg.name+":</b> "+msg.message;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;

// SHOW NOTIFICATION
let myName = document.getElementById("name").value;

if(document.hidden && msg.name !== myName){

if(Notification.permission === "granted"){

new Notification(msg.name + " says:", {
body: msg.message
});

}

}

});

window.send = send;

const PASSWORD_HASH = "0d08f09ddf93c9c5dbe3f15cd2f022e900b6298b902627d61c18751911e96f38";

async function sha256(text){

const encoder = new TextEncoder();
const data = encoder.encode(text);

const hashBuffer = await crypto.subtle.digest("SHA-256", data);

const hashArray = Array.from(new Uint8Array(hashBuffer));

const hashHex = hashArray.map(b => b.toString(16).padStart(2,"0")).join("");

return hashHex;

}

async function login(){

let p = document.getElementById("password").value;

let hash = await sha256(p);

if(hash === PASSWORD_HASH){

document.getElementById("login").style.display = "none";
document.getElementById("app").style.display = "block";

}
else{

alert("Wrong password");

}

}

window.login = login;

const ADMIN_PASSWORD = "bertilsbareboller";

const statusRef = ref(db,"siteStatus/online");

onValue(statusRef,(snapshot)=>{

let online = snapshot.val();

if(!online){

document.body.innerHTML = `
<h1>Chat is currently offline</h1>
<p>Maintenance in progress</p>
`;

}

});

</script>

</body>
</html>
