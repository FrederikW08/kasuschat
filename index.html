<!DOCTYPE html>
<html>
<head>
<title>Kasus Chat</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

#chat{
width:90%;
max-width:600px;
margin:auto;
height:400px;
overflow-y:scroll;
border:1px solid #444;
padding:10px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<div id="login">
<h2>Enter Password</h2>
<input id="password" type="password">
<button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">

  <h1>Kasus Chat</h1>

  <div id="chat"></div>

  <input id="name" placeholder="Your name">
  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCl_6vsYoZkEBMUNf0P4CK01hKCwA5P0XQ",
  authDomain: "kasuschat.firebaseapp.com",
  databaseURL: "https://kasuschat-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kasuschat",
  storageBucket: "kasuschat.firebasestorage.app",
  messagingSenderId: "953505535371",
  appId: "1:953505535371:web:0d44f20017bc8664948b8e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chat = ref(db, "messages");

function send(){

let name = document.getElementById("name").value;
let message = document.getElementById("message").value;

push(chat,{
name:name,
message:message
});

document.getElementById("message").value="";
}

onChildAdded(chat,(data)=>{

let msg = data.val();

let div = document.createElement("div");

div.innerHTML = "<b>"+msg.name+":</b> "+msg.message;

document.getElementById("chat").appendChild(div);

});

window.send = send;

const CHAT_PASSWORD = "pernillestænder";

function login(){

let p = document.getElementById("password").value;

if(p === CHAT_PASSWORD){
document.getElementById("login").style.display = "none";
document.getElementById("app").style.display = "block";
}
else{
alert("Wrong password");
}

}

window.login = login;

</script>

</body>
</html>
